<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>도서 바자회 POS - Pro Scanner</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: white; touch-action: manipulation; }
        .btn-active:active { transform: scale(0.98); }
        #reader { border: none !important; background: black; }
        #reader video { object-fit: cover !important; border-radius: 1.5rem; }
        
        /* Custom Scanner Overlay */
        .scanner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .scan-region {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 160px;
            border: 2px solid #4f46e5;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.5);
            border-radius: 1rem;
        }
        .scan-line {
            position: absolute;
            width: 100%; height: 2px;
            background: #ef4444;
            top: 50%;
            box-shadow: 0 0 8px #ef4444;
            animation: scan-move 2s infinite ease-in-out;
        }
        @keyframes scan-move {
            0%, 100% { transform: translateY(-60px); opacity: 0.2; }
            50% { transform: translateY(60px); opacity: 1; }
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px; width: 24px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            border: 3px solid white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const BOOK_DB = [
            {"barcode": "9788985186285", "title": "활성스님, 이 시대 불교를 말하다", "price": 1000},
            {"barcode": "9788985186308", "title": "빠알리 경 - 우리의 의지처", "price": 1000},
            {"barcode": "9788985186322", "title": "윤회고를 벗는 길", "price": 1000},
            {"barcode": "9788985186346", "title": "윤리와 도덕/ 코로나 사태를 어떻게 볼 것인가", "price": 1000},
            {"barcode": "9791191224030", "title": "산냐에서 빤냐로", "price": 1000},
            {"barcode": "9791191224047", "title": "상카아라와 담마", "price": 1000},
            {"barcode": "9791191224092", "title": "팔정도 다시 보기", "price": 1000},
            {"barcode": "9791191224405", "title": "부처님의 언설과 어법", "price": 1000},
            {"barcode": "9791191224672", "title": "십이연기 - 부처님 세상 보시는 눈", "price": 1000},
            {"barcode": "9791191224696", "title": "담마와 우주 학교", "price": 1000},
            {"barcode": "9788985186810", "title": "소리 빗질 마음 빗질", "price": 1000},
            {"barcode": "9788985186827", "title": "불교의 시작과 끝, 사성제", "price": 1000},
            {"barcode": "9788985186834", "title": "지금 여기 챙기기", "price": 1000},
            {"barcode": "9788985186865", "title": "참선과 팔정도", "price": 1000},
            {"barcode": "9788985186889", "title": "중도, 이 시대의 길", "price": 1000},
            {"barcode": "9788985186377", "title": "성지 순례의 길에서", "price": 500},
            {"barcode": "9788985186384", "title": "두려음과 슬픔을 느낄 때", "price": 500},
            {"barcode": "9788985186414", "title": "정근", "price": 500},
            {"barcode": "9788985186421", "title": "큰 합립주의", "price": 500}
        ];

        const App = () => {
            const [view, setView] = useState('pos');
            const [cart, setCart] = useState([]);
            const [sales, setSales] = useState([]);
            const [toast, setToast] = useState(null);
            const [manualInput, setManualInput] = useState("");

            useEffect(() => {
                const saved = localStorage.getItem('book_fair_sales_v2');
                if (saved) setSales(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('book_fair_sales_v2', JSON.stringify(sales));
            }, [sales]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 2000);
            };

            const addToCart = useCallback((barcode) => {
                const book = BOOK_DB.find(b => b.barcode === barcode);
                if (book) {
                    setCart(prev => {
                        const existing = prev.find(item => item.barcode === barcode);
                        if (existing) {
                            return prev.map(item => 
                                item.barcode === barcode ? { ...item, qty: item.qty + 1 } : item
                            );
                        }
                        return [...prev, { ...book, qty: 1 }];
                    });
                    showToast(`추가됨: ${book.title}`);
                    setManualInput("");
                }
            }, []);

            const handleCheckout = (method) => {
                if (cart.length === 0) return;
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                const newSale = {
                    id: Date.now(),
                    timestamp: new Date().toLocaleString('ko-KR'),
                    items: [...cart],
                    paymentMethod: method,
                    total: total
                };
                setSales(prev => [newSale, ...prev]);
                setCart([]);
                alert(`결제 완료! (${method})`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-900">
                    <header className="p-4 flex justify-between items-center bg-slate-800/50 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
                        <h1 className="text-xl font-black tracking-tighter text-indigo-400">BOOK POS PRO</h1>
                        <button 
                            onClick={() => setView(view === 'pos' ? 'admin' : 'pos')}
                            className="bg-white/10 px-4 py-2 rounded-full font-bold text-xs uppercase tracking-widest"
                        >
                            {view === 'pos' ? 'Admin' : 'Back'}
                        </button>
                    </header>

                    {toast && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-2xl z-[100] font-bold text-lg animate-bounce">
                            {toast}
                        </div>
                    )}

                    <main className="flex-grow p-4 pb-40">
                        {view === 'pos' ? (
                            <div className="space-y-6">
                                <div className="relative group">
                                    <ProScanner onScan={addToCart} />
                                </div>
                                
                                <div className="bg-slate-800 p-5 rounded-3xl border border-white/5">
                                    <div className="flex gap-2">
                                        <input 
                                            type="number" pattern="\d*"
                                            className="flex-grow bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-2xl font-bold focus:border-indigo-500 outline-none text-white"
                                            placeholder="바코드 수동입력"
                                            value={manualInput}
                                            onChange={(e) => setManualInput(e.target.value)}
                                        />
                                        <button 
                                            onClick={() => addToCart(manualInput)}
                                            className="bg-indigo-600 px-6 rounded-2xl font-black"
                                        >
                                            입력
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <h2 className="text-sm font-bold text-slate-400 uppercase tracking-widest px-2">Cart Items</h2>
                                    {cart.length === 0 ? (
                                        <div className="text-center py-12 bg-slate-800/30 rounded-3xl border border-dashed border-slate-700 text-slate-500">
                                            스캔을 시작하세요
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.barcode} className="bg-slate-800 p-4 rounded-2xl flex items-center justify-between border border-white/5">
                                                <div className="flex-grow pr-4">
                                                    <div className="font-bold text-lg leading-tight mb-1">{item.title}</div>
                                                    <div className="text-indigo-400 font-black">{(item.price * item.qty).toLocaleString()}원</div>
                                                </div>
                                                <div className="flex items-center gap-4 bg-slate-900 p-2 rounded-xl">
                                                    <button onClick={() => {
                                                        setCart(prev => prev.map(i => i.barcode === item.barcode ? {...i, qty: Math.max(0, i.qty-1)} : i).filter(i => i.qty > 0))
                                                    }} className="w-8 h-8 flex items-center justify-center text-xl font-bold">-</button>
                                                    <span className="text-lg font-black w-4 text-center">{item.qty}</span>
                                                    <button onClick={() => {
                                                        setCart(prev => prev.map(i => i.barcode === item.barcode ? {...i, qty: i.qty+1} : i))
                                                    }} className="w-8 h-8 flex items-center justify-center text-xl font-bold">+</button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <AdminView sales={sales} />
                        )}
                    </main>

                    {view === 'pos' && cart.length > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-800/90 backdrop-blur-xl p-6 border-t border-white/10 rounded-t-[2.5rem] shadow-2xl">
                            <div className="flex justify-between items-end mb-6 px-2">
                                <span className="text-slate-400 font-bold">Total Amount</span>
                                <span className="text-3xl font-black text-white">
                                    {cart.reduce((sum, item) => sum + (item.price * item.qty), 0).toLocaleString()}원
                                </span>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => handleCheckout('현금')} className="bg-emerald-600 text-white py-5 rounded-2xl font-black text-xl btn-active shadow-lg shadow-emerald-900/20">현금</button>
                                <button onClick={() => handleCheckout('계좌이체')} className="bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl btn-active shadow-lg shadow-indigo-900/20">계좌이체</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ProScanner = ({ onScan }) => {
            const [zoom, setZoom] = useState(1);
            const [zoomCaps, setZoomCaps] = useState({ min: 1, max: 1, step: 0.1 });
            const [isSupported, setIsSupported] = useState(true);
            const scannerRef = useRef(null);
            const trackRef = useRef(null);

            const triggerRefocus = async () => {
                if (!trackRef.current) return;
                try {
                    // Re-applying constraints forces the hardware to re-evaluate focus
                    await trackRef.current.applyConstraints({
                        advanced: [{ focusMode: "continuous" }]
                    });
                    // Visual feedback
                    const region = document.querySelector('.scan-region');
                    region.style.borderColor = '#ffffff';
                    setTimeout(() => region.style.borderColor = '#4f46e5', 300);
                } catch (e) {
                    console.error("Focus failed", e);
                }
            };

            const handleZoomChange = async (e) => {
                const val = parseFloat(e.target.value);
                setZoom(val);
                if (trackRef.current) {
                    await trackRef.current.applyConstraints({
                        advanced: [{ zoom: val }]
                    });
                }
            };

            useEffect(() => {
                const html5QrCode = new Html5Qrcode("reader");
                scannerRef.current = html5QrCode;

                const config = { 
                    fps: 25, // Higher FPS for faster capture
                    qrbox: { width: 280, height: 160 }, // Rectangular for EAN-13
                    formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13 ],
                    aspectRatio: 1.0
                };

                const startCamera = async () => {
                    try {
                        await html5QrCode.start(
                            { facingMode: "environment" },
                            { 
                                ...config,
                                // Requesting high resolution for small barcode detail
                                videoConstraints: {
                                    width: { ideal: 1920 },
                                    height: { ideal: 1080 },
                                    facingMode: "environment"
                                }
                            },
                            (text) => {
                                onScan(text);
                                // Haptic feedback if supported
                                if (window.navigator.vibrate) window.navigator.vibrate(100);
                            }
                        );

                        // Access hardware capabilities
                        const track = html5QrCode.getRunningTrack();
                        trackRef.current = track;
                        const capabilities = track.getCapabilities();
                        
                        if (capabilities.zoom) {
                            setZoomCaps({
                                min: capabilities.zoom.min,
                                max: capabilities.zoom.max,
                                step: capabilities.zoom.step
                            });
                            setZoom(capabilities.zoom.min);
                        }
                    } catch (err) {
                        console.error(err);
                        setIsSupported(false);
                    }
                };

                startCamera();

                return () => {
                    if (html5QrCode.isScanning) {
                        html5QrCode.stop().catch(e => console.log(e));
                    }
                };
            }, [onScan]);

            return (
                <div className="relative overflow-hidden rounded-[2rem] bg-black aspect-square border-4 border-slate-800 shadow-2xl">
                    <div id="reader" className="w-full h-full"></div>
                    
                    {/* Custom UI Overlay */}
                    <div className="scanner-overlay" onClick={triggerRefocus}>
                        <div className="scan-region">
                            <div className="scan-line"></div>
                            {/* Corner Accents */}
                            <div className="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-white rounded-tl-lg"></div>
                            <div className="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-right-4 border-white rounded-tr-lg"></div>
                            <div className="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-white rounded-bl-lg"></div>
                            <div className="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-right-4 border-white rounded-br-lg"></div>
                        </div>
                    </div>

                    {/* Zoom Controls */}
                    {zoomCaps.max > 1 && (
                        <div className="absolute bottom-6 left-0 right-0 px-8 z-20">
                            <div className="bg-black/60 backdrop-blur-md p-4 rounded-2xl border border-white/10">
                                <div className="flex justify-between text-[10px] font-black mb-2 uppercase tracking-widest text-slate-400">
                                    <span>Zoom 1x</span>
                                    <span className="text-indigo-400">Level: {zoom.toFixed(1)}x</span>
                                    <span>{zoomCaps.max}x</span>
                                </div>
                                <input 
                                    type="range"
                                    min={zoomCaps.min}
                                    max={zoomCaps.max}
                                    step={zoomCaps.step}
                                    value={zoom}
                                    onChange={handleZoomChange}
                                    className="w-full h-2 bg-slate-700 rounded-lg appearance-none outline-none"
                                />
                            </div>
                        </div>
                    )}

                    {/* Refocus Button */}
                    <button 
                        onClick={triggerRefocus}
                        className="absolute top-6 right-6 z-20 bg-white/10 backdrop-blur-md p-3 rounded-full border border-white/20 active:scale-90 transition-transform"
                    >
                        <i data-lucide="focus"></i>
                    </button>

                    <div className="absolute top-6 left-6 z-20 bg-indigo-600/80 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter">
                        1080p HD Active
                    </div>
                </div>
            );
        };

        const AdminView = ({ sales }) => {
            const total = sales.reduce((sum, s) => sum + s.total, 0);
            
            const exportCSV = () => {
                let csv = "\uFEFF날짜,항목,결제수단,총액\n";
                sales.forEach(s => {
                    const items = s.items.map(i => `${i.title}(${i.qty})`).join(" | ");
                    csv += `${s.timestamp},"${items}",${s.paymentMethod},${s.total}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `sales_${new Date().getTime()}.csv`;
                link.click();
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-indigo-600 p-8 rounded-[2.5rem] shadow-xl shadow-indigo-900/40">
                        <div className="text-indigo-200 font-bold text-sm uppercase tracking-widest mb-1">Total Revenue</div>
                        <div className="text-4xl font-black">{total.toLocaleString()}원</div>
                    </div>

                    <button onClick={exportCSV} className="w-full bg-slate-800 border border-white/10 py-5 rounded-2xl font-bold flex items-center justify-center gap-3">
                        <i data-lucide="download"></i> CSV 내역 다운로드
                    </button>

                    <div className="space-y-3">
                        <h3 className="font-black text-slate-400 uppercase tracking-widest text-xs px-2">Recent Transactions</h3>
                        {sales.map(sale => (
                            <div key={sale.id} className="bg-slate-800/50 p-5 rounded-3xl border border-white/5">
                                <div className="flex justify-between items-start mb-3">
                                    <div className="text-[10px] text-slate-500 font-mono">{sale.timestamp}</div>
                                    <div className="bg-slate-700 px-2 py-1 rounded text-[10px] font-bold">{sale.paymentMethod}</div>
                                </div>
                                <div className="text-sm font-medium text-slate-300 mb-2">
                                    {sale.items.map(i => `${i.title} x${i.qty}`).join(", ")}
                                </div>
                                <div className="text-xl font-black text-right text-indigo-400">
                                    {sale.total.toLocaleString()}원
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
